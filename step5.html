<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>STEP5テスト</title>
    <style>
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }

        .item {
            margin-top: 5px;
        }
    </style>
</head>
<body id="body">
    <input type="text" id="inputText">
    <button id="showBtn" onclick="showText()">表示</button>
    <button onclick="changeColor()">背景色を変更</button>

    <p id="outputArea"></p>
    <div id="listArea"></div>

<script>
    let addCount = 0;
    //設問１＋３＋４
    function showText() {
        const text = document.getElementById("inputText").value;
        const output = document.getElementById("outputArea");
        const listArea = document.getElementById("listArea");
        
        if (text === "") {
            alert("入力値が空です。");
            return;
        }
        //表示エリア
        output.textContent = text;
        output.classList.toggle("highlight");

        //設問４：テーブルへの追加
        const div = document.createElement("div");
        div.className = "item";
        const span = document.createElement("span");
        span.textContent = text;
        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "削除";

        //設問５：削除機能
        deleteBtn.onclick = function() {
            listArea.removeChild(div);

            addCount--;

            if(addCount < 3) {
                document.getElementById("showBtn").style.display = "inline";
            }
        };

        div.appendChild(span);
        div.appendChild(deleteBtn);
        listArea.appendChild(div);

        //追加回数カウント
        addCount++;

        //設問６
        if (listArea.children.length > 3) {
            listArea.removeChild(listArea.firstElementChild);
            addCount--;
        }

        //3回以上で「表示」ボタン非表示
        if (addCount >= 3) {
            document.getElementById("showBtn").style.display = "none";
        }
    }

    //設問２
    const colors = ["lightblue", "lightgreen", "lightcoral"];
    let index = 0;
    
    function changeColor() {
        document.getElementById("body").style.backgroundColor = colors[index];
        index++;
        if (index >= colors.length) {
        index = 0;
        }
    }

    //設問７
    for (let i = 1; i <= 5; i++) {
        console.log(i);
    }
    
</script>

</body>
</html>
